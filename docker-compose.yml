version: "3.9"

services:

  web:
    build: .
    container_name: php_app
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: mechanic_db
      DB_USER: sami
      DB_PASSWORD: Sm/131301
      APP_URL: http://localhost:8080
    volumes:
      - ./src:/var/www/html
    networks:
      - app_network

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: mechanic_db
      MYSQL_USER: sami
      MYSQL_PASSWORD: Sm/131301
      MYSQL_ROOT_PASSWORD: Sm/131301
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: Sm/131301
    depends_on:
      - db
    networks:
      - app_network

volumes:
  db_data:

networks:

  app_network:



